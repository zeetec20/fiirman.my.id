name: Lighthouse CI

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      # No manual preview server: lhci's startServerCommand boots
      # `wrangler dev` per run, which matches the production Workers
      # stack (a second server on :3000 would conflict and get audited
      # instead).
      - name: Lighthouse (mobile)
        run: bun run lh
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Lighthouse (desktop)
        run: bun run lh:desktop
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 14
