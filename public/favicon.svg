<?xml version="1.0" encoding="UTF-8"?>
<!--
  Hallmark · component: favicon · genre: editorial · theme: design.md (locked)
  Manuscript-illuminated initial "F" of Firman Lestari — rubric on parchment,
  hairline frame, single fleuron pip ornament. Colors as hex literals so
  build-time rasterizers (sharp/libvips) can parse them — OKLCH support in
  librsvg is too new to rely on.
  Hex values frozen from the @theme tokens in src/styles.css (light branch).
    parchment #f0eadd · ink #1f1c19 · rubric #8a2d1d
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 100 100"
  role="img"
  aria-labelledby="favicon-title"
>
  <title id="favicon-title">Firman Lestari</title>

  <!-- Parchment ground -->
  <rect x="0" y="0" width="100" height="100" fill="#f0eadd" />

  <!-- Hairline frame, double-rule: outer + inner thin -->
  <rect
    x="6" y="6" width="88" height="88"
    fill="none"
    stroke="#1f1c19"
    stroke-width="2"
  />
  <rect
    x="11" y="11" width="78" height="78"
    fill="none"
    stroke="#1f1c19"
    stroke-width="0.8"
    opacity="0.6"
  />

  <!-- Manuscript "F" — drawn as paths so it reads at 16px.
       Stem 14 wide, top arm 44 wide × 12 tall, middle arm 30 wide × 9 tall.
       Triangular serifs at stem feet + arm ends. -->
  <g fill="#8a2d1d">
    <!-- Vertical stem -->
    <rect x="30" y="22" width="14" height="56" />

    <!-- Top arm -->
    <rect x="30" y="22" width="44" height="12" />

    <!-- Middle crossbar -->
    <rect x="30" y="46" width="28" height="9" />

    <!-- Top-left serif foot -->
    <polygon points="26,22 30,22 30,28 26,30" />
    <!-- Top-right serif of top arm -->
    <polygon points="74,22 78,22 78,30 74,28" />
    <!-- Bottom-right serif of top arm -->
    <polygon points="74,34 78,32 78,38 74,36" />
    <!-- Right serif of middle crossbar -->
    <polygon points="58,46 60,48 58,55 56,53" />
    <!-- Bottom-left serif of stem -->
    <polygon points="26,76 30,74 30,78 26,80" />
    <!-- Bottom-right serif of stem -->
    <polygon points="44,74 48,76 48,80 44,78" />
  </g>

  <!-- Fleuron pip — single rubric dot top-right of crossbar, manuscript flourish -->
  <circle cx="66" cy="50" r="2.2" fill="#8a2d1d" />

  <!-- Subtle ink underline beneath the F — folio dignifier -->
  <line
    x1="24" y1="84" x2="76" y2="84"
    stroke="#1f1c19"
    stroke-width="0.8"
    opacity="0.5"
  />
</svg>
